[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
log_cli = false
log_cli_level = WARNING

markers =
    e2e: End-to-end tests that hit the real Cookidoo API (require credentials)
    e2e_cleanup: E2e cleanup tests that delete test data (run last)
