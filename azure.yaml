# Azure Developer CLI (azd) configuration for Cookidoo Agent Assistant
# Run: azd up  (provisions infra + builds + deploys everything)
# Docs: https://learn.microsoft.com/azure/developer/azure-developer-cli/

name: cookidoo-agent
metadata:
  template: cookidoo-agent@0.1.0

# Infrastructure configuration (Bicep)
infra:
  provider: bicep
  path: infra
  module: main

# Service definitions — each maps to an Azure Container App
services:
  backend:
    project: ./backend
    host: containerapp
    language: python
    docker:
      path: ../docker/backend.Dockerfile
      context: .
    hooks:
      # Ensure .env file exists before build
      prebuild:
        windows:
          shell: pwsh
          run: if (-not (Test-Path .env)) { Copy-Item .env.example .env -ErrorAction SilentlyContinue }
        posix:
          shell: sh
          run: '[ -f .env ] || cp .env.example .env 2>/dev/null || true'

  frontend:
    project: ./frontend
    host: containerapp
    language: js
    docker:
      path: ../docker/frontend.Dockerfile
      context: ..
    hooks:
      prebuild:
        windows:
          shell: pwsh
          run: if (-not (Test-Path .env)) { Copy-Item .env.example .env -ErrorAction SilentlyContinue }
        posix:
          shell: sh
          run: '[ -f .env ] || cp .env.example .env 2>/dev/null || true'

  mcp-server:
    project: ./mcp-server
    host: containerapp
    language: python
    docker:
      path: ../docker/mcp.Dockerfile
      context: ..

# Pipeline configuration (generated by: azd pipeline config)
pipeline:
  provider: github
