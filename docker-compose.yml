version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: cookidoo-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DEBUG=true
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=http://localhost:3000
      - MCP_SERVER_URL=http://mcp-server:8001
      - MCP_SSE_URL=http://mcp-server:8002
      # Add other environment variables from .env
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
    depends_on:
      - mcp-server
    networks:
      - cookidoo-network
    restart: unless-stopped

  # MCP Server (REST API on 8001, MCP SSE protocol on 8002)
  mcp-server:
    build:
      context: ..
      dockerfile: docker/mcp.Dockerfile
    container_name: cookidoo-mcp
    ports:
      - "8001:8001" # REST API (backend, Databricks REST calls)
      - "8002:8002" # MCP SSE protocol (Databricks AI agents)
    environment:
      - ENV=development
      - LOG_LEVEL=INFO
      - MCP_SSE_PORT=8002
      # Cookidoo credentials (use .env file or Azure Key Vault in production)
      - COOKIDOO_EMAIL=${COOKIDOO_EMAIL:-}
      - COOKIDOO_PASSWORD=${COOKIDOO_PASSWORD:-}
    env_file:
      - ../mcp-server/.env
    networks:
      - cookidoo-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: cookidoo-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_ENV=development
    depends_on:
      - backend
    networks:
      - cookidoo-network
    restart: unless-stopped

networks:
  cookidoo-network:
    driver: bridge

volumes:
  backend-data:
